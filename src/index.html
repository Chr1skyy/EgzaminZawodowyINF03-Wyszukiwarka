<!DOCTYPE html>
<html lang="pl" data-theme="dark">

<head>
    <script>
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZINF.IT - Arkusze INF.03, EE.09, E.14 - Wyszukiwarka rozwiązań</title>
    <!-- SEO -->
    <link rel="canonical" href="https://ezinf.it/">
    <meta name="description"
        content="Pobierz oficjalne arkusze egzaminacyjne INF.03, EE.09 i E.14. Sprawdź rozwiązania zadań, pobierz załączniki i zdaj egzamin zawodowy z informatyki!">
    <meta name="theme-color" content="#F24B00">
    <meta name="author" content="Chr1skyy">

    <!-- Fonts & Styles -->
    <link rel="preconnect" href="https://cdn.ezinf.it">
    <link rel="preload" href="data.json" as="fetch" crossorigin fetchpriority="high">
    <link rel="stylesheet" href="css/styles.css">

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="128x128" href="/favicon.png">
    <link rel="alternate icon" href="/favicon.ico" type="image/x-icon">

    <!-- Open Graph -->
    <meta property="og:title" content="Wyszukiwarka egzaminów zawodowych INF.03, EE.09 i E.14">
    <meta property="og:description"
        content="Ponad 130 oficjalnych arkuszy egzaminacyjnych z lat 2018-2026. Wygodna wyszukiwarka, sprawdzone rozwiązania zadań i załączniki. Sprawdź swoją wiedzę już teraz!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ezinf.it/">
    <meta property="og:image" content="https://ezinf.it/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/png">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Analytics -->
    <script defer src="https://analytics.ezinf.it/script.js" data-website-id="714f3251-20e1-46cd-8ca4-48ae580c848b"
        data-domains="ezinf.it,www.ezinf.it" data-performance="true"></script>
    <!-- JSON-LD -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Wyszukiwarka egzaminów zawodowych INF.03, EE.09, E.14",
        "url": "https://ezinf.it/",
        "description": "Ponad 130 oficjalnych arkuszy egzaminacyjnych z lat 2018-2026. Wygodna wyszukiwarka, sprawdzone rozwiązania zadań i załączniki.",
        "potentialAction": {
            "@type": "SearchAction",
            "target": "https://ezinf.it/?q={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
    </script>
</head>

<body>
    <a href="#results-grid" class="skip-link">Przejdź do listy arkuszy</a>
    <div id="app">
        <header class="header">
            <div class="header-container">
                <div class="header-brand">
                    <div class="brand-icon">
                        <img src="favicon.png" alt="Logo wyszukiwarki egzaminów" fetchpriority="high">
                    </div>
                    <div class="brand-text">
                        <h1>EZINF.IT</h1>
                    </div>
                </div>
                <div class="header-search-container"></div>
                <div class="header-actions">
                    <a href="https://github.com/Chr1skyy" target="_blank" rel="noopener" class="header-btn github-btn"
                        aria-label="Profil autora na GitHub" data-umami-event="Github link">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.4 13.4 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22" />
                        </svg>
                        <span>Chr1skyy</span>
                    </a>
                    <a href="https://tipply.pl/@chriskyy" target="_blank" rel="noopener" class="header-btn support-btn"
                        aria-label="Wesprzyj autora na Tipply" data-umami-event="Support link">

                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M12 4.528a6 6 0 0 0-8.243 8.715l6.829 6.828a2 2 0 0 0 2.828 0l6.829-6.828A6 6 0 0 0 12 4.528zm-1.172 1.644l.465.464a1 1 0 0 0 1.414 0l.465-.464a4 4 0 1 1 5.656 5.656L12 18.657l-6.828-6.829a4 4 0 0 1 5.656-5.656z"
                                fill="#fff" />
                        </svg>
                    </a>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="search-section" role="search" aria-label="Wyszukiwarka egzaminów">
                <div class="search-container">
                    <div class="search-input-wrapper">
                        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            aria-hidden="true">
                            <circle cx="11" cy="11" r="8" />
                            <path d="m21 21-4.35-4.35" />
                        </svg>
                        <input type="search" id="search-input" placeholder="Szukaj po roku, tytule, tagach..."
                            class="search-input" aria-label="Wyszukaj egzaminy po roku, tytule lub tagach">
                        <button id="search-clear-btn" class="search-clear-btn" aria-label="Wyczyść wyszukiwanie"
                            title="Wyczyść">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                        <div id="search-suggestions" class="search-suggestions" style="display: none;"></div>
                    </div>

                </div>
            </div>

            <div class="content-layout">
                <div class="content-layout-wrapper">
                    <aside class="filter-panel">
                        <div class="filter-header">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="22,3 2,3 10,12.46 10,19 14,21 14,12.46" />
                            </svg>
                            <h2>Filtry</h2>
                            <button id="clear-filters-btn" class="reset-filters" aria-label="Resetuj filtry">
                                <svg class="reset-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <polyline points="1 4 1 10 7 10" />
                                    <path d="M3.51 15a9 9 0 1 0 .49-7.5" />
                                </svg>
                            </button>
                        </div>

                        <div class="filters">
                            <div class="filter-section">
                                <h3>Formuła</h3>
                                <div class="filter-buttons" id="formula-filters">
                                    <button class="filter-btn" data-filter="formula" data-value="E.14">E.14</button>
                                    <button class="filter-btn" data-filter="formula" data-value="EE.09">EE.09</button>
                                    <button class="filter-btn" data-filter="formula" data-value="INF.03">INF.03</button>
                                </div>
                            </div>

                            <div class="filter-section">
                                <h3>Trudność</h3>
                                <div class="filter-buttons" id="difficulty-filters">
                                    <button class="filter-btn difficulty-easy" data-filter="difficulty"
                                        data-value="Easy">Easy</button>
                                    <button class="filter-btn difficulty-medium" data-filter="difficulty"
                                        data-value="Medium">Medium</button>
                                    <button class="filter-btn difficulty-hard" data-filter="difficulty"
                                        data-value="Hard">Hard</button>
                                </div>
                            </div>

                            <div class="filter-section">
                                <h3>Język</h3>
                                <div class="filter-buttons" id="language-filters">
                                </div>
                            </div>

                            <div class="filter-section">
                                <h3>Sesja</h3>
                                <div class="filter-buttons" id="session-filters">
                                </div>
                            </div>

                            <div class="filter-section tag-filter-section">
                                <h3>Tagi</h3>
                                <div class="custom-select-wrapper" id="custom-tag-select">
                                    <button class="custom-select-button" aria-haspopup="listbox" aria-expanded="false">
                                        <span class="custom-select-text">Wszystkie tagi</span>
                                        <svg class="custom-select-icon" width="16" height="16" viewBox="0 0 24 24"
                                            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                            stroke-linejoin="round">
                                            <polyline points="6 9 12 15 18 9"></polyline>
                                        </svg>
                                    </button>
                                    <div class="custom-select-dropdown" role="listbox">
                                    </div>
                                </div>
                            </div>

                            <div class="filter-section hide-completed-section">
                                <button id="hide-completed-toggle" class="hide-completed-btn">
                                    <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                        stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                        <circle cx="12" cy="12" r="3" />
                                    </svg>
                                    <svg class="eye-off-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                        stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                                        <path
                                            d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 11 8 11 8a13.16 13.16 0 0 1-1.67 2.68" />
                                        <path
                                            d="M6.61 6.61A13.526 13.526 0 0 0 1 12s4 8 11 8a9.74 9.74 0 0 0 5.39-1.61" />
                                        <line x1="2" y1="2" x2="22" y2="22" />
                                    </svg>
                                    <span>Ukryj ukończone egzaminy</span>
                                </button>
                            </div>
                        </div>
                    </aside>
                </div>

                <div class="results-section">
                    <div class="results-header">
                        <h2>Wyniki wyszukiwania</h2>
                        <span id="results-count" class="results-count" aria-live="polite">0 z 0 egzaminów</span>
                    </div>
                    <div id="results-grid" class="results-grid">
                    </div>
                    <div id="no-results" class="no-results" style="display: none;">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8" />
                            <path d="m21 21-4.35-4.35" />
                        </svg>
                        <h3>Nie znaleziono egzaminów</h3>
                        <p>Spróbuj dostosować kryteria wyszukiwania lub filtry.</p>
                    </div>
                </div>
            </div>
        </main>

        <dialog id="exam-modal" class="modal">
            <div class="modal-content custom-modal-layout">
                <button id="modal-close" class="modal-close-high" aria-label="Zamknij podgląd">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
                <div class="modal-image">
                    <img id="modal-image" src="" alt="Podgląd zadania" loading="lazy">
                </div>
                <div id="modal-dynamic-content" class="exam-content">
                </div>
            </div>
        </dialog>
        <button id="back-to-top" class="back-to-top" aria-label="Wróć na górę" title="Wróć na górę">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="18 15 12 9 6 15"></polyline>
            </svg>
        </button>
        <button id="toggle-theme" class="toggle-theme-btn" aria-label="Zmień motyw" title="Zmień motyw">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10m0-2V4a8 8 0 1 1 0 16"
                    fill="currentcolor" />
            </svg>
        </button>
    </div>
    <script defer src="js/utils.js"></script>
    <script defer src="js/components.js"></script>
    <script defer src="js/storage.js"></script>
    <script defer src="js/filters.js"></script>
    <script defer src="js/search.js"></script>
    <script defer src="js/app.js"></script>
    <script defer src="js/modal.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW registration failed: ', err));
            });
        }
    </script>
</body>

</html>
